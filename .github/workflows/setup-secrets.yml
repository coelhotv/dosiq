name: Setup Secrets for Vercel Integration

# Workflow para configuração de secrets necessários para integração
# GitHub Actions ↔ Vercel ↔ Supabase
#
# Uso: Este workflow verifica e documenta os secrets necessários.
# Para adicionar secrets, use os comandos documentados em docs/vercel-env-setup.md

on:
  workflow_dispatch:
    inputs:
      check_only:
        description: 'Apenas verificar secrets (não gerar)'
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  check-secrets:
    name: Verificar Secrets Configurados
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Verificar Secrets Necessários
        uses: actions/github-script@v7
        with:
          script: |
            const secrets = [
              'VERCEL_GITHUB_ACTIONS_SECRET',
              'VERCEL_BLOB_TOKEN',
              'SUPABASE_URL',
              'SUPABASE_SERVICE_ROLE_KEY'
            ];
            
            console.log('🔍 Verificando secrets configurados...\n');
            
            let allConfigured = true;
            
            for (const secretName of secrets) {
              // Tentar acessar o secret (não mostra o valor, apenas verifica existência)
              const secretValue = process.env[secretName] || '';
              const isConfigured = secretValue.length > 0;
              
              if (isConfigured) {
                console.log(`✅ ${secretName}: Configurado (${secretValue.length} caracteres)`);
              } else {
                console.log(`❌ ${secretName}: NÃO configurado`);
                allConfigured = false;
              }
            }
            
            console.log('\n' + '='.repeat(50));
            
            if (allConfigured) {
              console.log('✅ Todos os secrets estão configurados!');
            } else {
              console.log('⚠️  Alguns secrets estão faltando.');
              console.log('\nConsulte docs/vercel-env-setup.md para instruções de configuração.');
            }
            
            // Output para uso em outros jobs
            core.setOutput('all_configured', allConfigured.toString());
        env:
          VERCEL_GITHUB_ACTIONS_SECRET: ${{ secrets.VERCEL_GITHUB_ACTIONS_SECRET }}
          VERCEL_BLOB_TOKEN: ${{ secrets.VERCEL_BLOB_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  generate-secret:
    name: Gerar VERCEL_GITHUB_ACTIONS_SECRET
    runs-on: ubuntu-latest
    # Só executa se check_only for false
    if: github.event.inputs.check_only == 'false'
    
    steps:
      - name: Gerar Secret Seguro
        run: |
          echo "🎲 Gerando VERCEL_GITHUB_ACTIONS_SECRET seguro..."
          echo ""
          SECRET=$(openssl rand -base64 32)
          echo "Valor gerado:"
          echo ""
          echo "  $SECRET"
          echo ""
          echo "⚠️  IMPORTANTE:"
          echo "   1. Copie este valor e configure no GitHub:"
          echo "      https://github.com/${{ github.repository }}/settings/secrets/actions"
          echo "   2. Configure o MESMO valor no Vercel:"
          echo "      https://vercel.com/dashboard → Seu Projeto → Settings → Environment Variables"
          echo "   3. NÃO commite este valor!"
          echo ""
          echo "Comando para configurar no GitHub (gh CLI):"
          echo "  gh secret set VERCEL_GITHUB_ACTIONS_SECRET --body \"$SECRET\""
